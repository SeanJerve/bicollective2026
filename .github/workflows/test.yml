name: Test Suite CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  unit-tests:
    name: Run Component Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Component Tests (Vitest)
        run: npm run test
        env:
          # Provide dummy Supabase values — tests use mocked client, no real connection needed
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: mock-anon-key

  # NOTE: Playwright E2E tests are intentionally excluded from CI.
  # They require:
  #   1. A live Supabase instance with seeded demo accounts
  #      (customer.juan@demo.com / vendor.syndicate@demo.com)
  #   2. A running local dev server at http://localhost:8080
  #   3. A local filesystem for screenshot output
  # Run E2E tests locally with: npx playwright test
