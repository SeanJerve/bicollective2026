<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bicollective — Local Bicolano Fashion Marketplace</title>
    <meta name="description" content="Shop curated collections from verified local Bicolano clothing brands. Quality fashion, community-driven commerce from the Bicol region." />
    <meta name="author" content="Bicollective" />
    <meta name="keywords" content="Bicol fashion, Bicolano clothing, local brands Philippines, Bicollective marketplace" />
    <link rel="canonical" href="https://bicollective.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="Bicollective — Local Bicolano Fashion Marketplace" />
    <meta property="og:description" content="Shop curated collections from verified local Bicolano clothing brands. Quality fashion, community-driven commerce." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bicollective" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bicollective — Local Bicolano Fashion Marketplace" />
    <meta name="twitter:description" content="Shop curated collections from verified local Bicolano clothing brands." />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Bicollective",
      "url": "https://bicollective.com",
      "description": "Local Bicolano fashion marketplace featuring verified clothing brands from the Bicol region.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://bicollective.com/products?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
